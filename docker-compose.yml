# Local/dev deployment - docs/architecture/21-deployment.md §1's topology,
# trimmed to exactly what this codebase actually uses today: CockroachDB
# (real 3-node cluster, per the operator's own "we need clustering
# capability" instruction - not a single-node dev shortcut), the Control
# Plane, and one Worker. NATS/Redis/MinIO are in the target architecture
# but nothing in this codebase is wired to them yet - omitted rather than
# included unused.
services:
  cockroach-0:
    image: cockroachdb/cockroach:latest
    command: ["start", "--insecure", "--join=cockroach-0,cockroach-1,cockroach-2"]
    volumes: ["cockroach-0-data:/cockroach/cockroach-data"]

  cockroach-1:
    image: cockroachdb/cockroach:latest
    command: ["start", "--insecure", "--join=cockroach-0,cockroach-1,cockroach-2"]
    volumes: ["cockroach-1-data:/cockroach/cockroach-data"]

  cockroach-2:
    image: cockroachdb/cockroach:latest
    command: ["start", "--insecure", "--join=cockroach-0,cockroach-1,cockroach-2"]
    volumes: ["cockroach-2-data:/cockroach/cockroach-data"]

  cockroach-init:
    image: cockroachdb/cockroach:latest
    # `cockroach init` itself isn't idempotent (a real gap found by
    # actually re-running `docker-compose up` a second time, not
    # assumed) - a restarted stack re-runs this one-shot service every
    # time, so "already initialized" has to be treated as success too,
    # not just the first-run "successfully initialized" message.
    entrypoint: ["sh", "-c"]
    command:
      - |
        ./cockroach init --insecure --host=cockroach-0 2>&1 | tee /tmp/init.log
        grep -qE "Cluster successfully initialized|already been initialized" /tmp/init.log
    depends_on: [cockroach-0, cockroach-1, cockroach-2]
    restart: "no"

  # One-shot: creates the `platform` database and the non-superuser
  # `platform_app` role the Control Plane connects as
  # (docs/architecture/05-database.md §1) - real bootstrap steps a fresh
  # cluster needs before the Control Plane's own migrations can run.
  cockroach-bootstrap:
    image: cockroachdb/cockroach:latest
    entrypoint: ["sh", "-c"]
    command:
      - |
        ./cockroach sql --insecure --host=cockroach-0 -e "CREATE DATABASE IF NOT EXISTS platform;" &&
        ./cockroach sql --insecure --host=cockroach-0 -e "CREATE USER IF NOT EXISTS platform_app;"
    depends_on:
      cockroach-init:
        condition: service_completed_successfully
    restart: "no"

  # One-shot: generates a real dev CA plus a server cert (CN=control-plane,
  # SAN=control-plane,localhost) and a client cert (CN=worker), all signed
  # by that CA, into the mtls-certs volume both control-plane and worker
  # mount read-only. Real mTLS (internal/platform/mtls), not a TLS-
  # disabled dev shortcut like CockroachDB's --insecure - the previous
  # gRPC setup used insecure.NewCredentials() (plaintext, no peer
  # verification at all); this generates the real key material that
  # replaces it. Skips regeneration if the CA already exists in the
  # volume, same idempotency posture as cockroach-init.
  mtls-init:
    image: alpine:3.20
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache openssl >/dev/null
        cd /certs
        if [ -f ca-cert.pem ]; then echo "certs already exist, skipping"; exit 0; fi
        openssl genrsa -out ca-key.pem 4096
        openssl req -x509 -new -nodes -key ca-key.pem -sha256 -days 3650 -out ca-cert.pem -subj "/CN=platform-of-platform-dev-ca"
        openssl genrsa -out server-key.pem 4096
        openssl req -new -key server-key.pem -out server.csr -subj "/CN=control-plane"
        printf "subjectAltName=DNS:control-plane,DNS:localhost\n" > server-ext.cnf
        openssl x509 -req -in server.csr -CA ca-cert.pem -CAkey ca-key.pem -CAcreateserial -out server-cert.pem -days 3650 -sha256 -extfile server-ext.cnf
        openssl genrsa -out worker-key.pem 4096
        openssl req -new -key worker-key.pem -out worker.csr -subj "/CN=worker"
        openssl x509 -req -in worker.csr -CA ca-cert.pem -CAkey ca-key.pem -CAcreateserial -out worker-cert.pem -days 3650 -sha256
        rm -f *.csr *.srl *-ext.cnf
        chmod 644 *.pem
    volumes:
      - mtls-certs:/certs
    restart: "no"

  # Real distributed tracing backend (docs' own deferred OpenTelemetry
  # gap, built for real now) - all-in-one is the genuine "one container,
  # in-memory storage, real OTLP receiver + real Jaeger UI" shape every
  # local/dev OTel setup uses; a production deployment would split this
  # into a real collector + a persistent trace store (Elasticsearch/
  # Cassandra/ClickHouse), a further, real, not-built-here step. UI
  # published to the host (16686) so the operator can actually look at
  # traces; the OTLP receiver ports (4317 grpc, 4318 http) stay
  # internal-only - only control-plane/worker need to reach them, over
  # the compose network's own DNS.
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  # Multi-instance Control Plane HA coordination store (internal/
  # execution/adapters/grpc's Registry - runID/Worker routing shared
  # across replicas, docs/architecture/05-database.md §5's own "cache/
  # coordination, never system-of-record" role) - not persisted to a
  # volume, matching that role: losing it just means every replica's
  # cross-instance Cancel routing resets, the same as a fresh boot,
  # never the loss of any authoritative state (that's still CockroachDB).
  redis:
    image: redis:7-alpine

  # Real secrets backend (docs/architecture/11-module-secrets-state.md
  # §1) - dev mode (auto-unsealed, in-memory storage, root token fixed
  # via env for this compose stack's own reproducibility) rather than a
  # mock; a production deployment would point secret_mounts at a real
  # persistent Vault cluster instead of this one, but the AppRole login
  # + KV v2 read path this codebase actually implements
  # (internal/secrets/adapters/vault) is exercised for real against this
  # server, not stubbed.
  vault:
    image: hashicorp/vault:1.17
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-only-root-token-not-for-production"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"

  # One-shot: dev-mode Vault auto-mounts a KV v2 engine at "secret/" but
  # doesn't configure AppRole auth on its own - this creates the
  # policy/role a SecretMount actually authenticates as, then logs the
  # real role_id/secret_id pair (`docker logs platform-of-platform-vault-init-1`)
  # for whoever is creating a SecretMount via the API to use. Idempotent
  # the same way cockroach-init/mtls-init are: `|| true` on the two
  # enable calls (already-enabled is a real error from Vault, not
  # something to fail this service over on a restarted stack), and
  # `vault write auth/approle/role/...` itself is already a plain
  # upsert.
  vault-init:
    image: hashicorp/vault:1.17
    entrypoint: ["sh", "-c"]
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-only-root-token-not-for-production"
    command:
      - |
        set -e
        until vault status >/dev/null 2>&1; do sleep 1; done
        vault auth enable approle || true
        vault policy write platform-of-platform-policy - <<'EOF'
        path "secret/data/*" {
          capabilities = ["read"]
        }
        EOF
        vault write auth/approle/role/platform-of-platform \
          token_policies="platform-of-platform-policy" \
          token_ttl=1h token_max_ttl=4h secret_id_ttl=0 secret_id_num_uses=0
        echo "ROLE_ID=$(vault read -field=role_id auth/approle/role/platform-of-platform/role-id)"
        echo "SECRET_ID=$(vault write -f -field=secret_id auth/approle/role/platform-of-platform/secret-id)"
    depends_on:
      vault:
        condition: service_started
    restart: "no"

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    depends_on:
      cockroach-bootstrap:
        condition: service_completed_successfully
      mtls-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
      redis:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://root@cockroach-0:26257/platform?sslmode=disable
      APP_DATABASE_URL: postgresql://platform_app@cockroach-0:26257/platform?sslmode=disable
      HTTP_ADDR: ":8443"
      GRPC_ADDR: ":9000"
      TLS_CA_CERT: /certs/ca-cert.pem
      TLS_SERVER_CERT: /certs/server-cert.pem
      TLS_SERVER_KEY: /certs/server-key.pem
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "control-plane"
      REDIS_ADDR: "redis:6379"
      # Dev-only bootstrap secret (docs/architecture/21-deployment.md §1's
      # own MASTER_KEY framing) - a real deployment sources this from a
      # real secret store, not a compose file default.
      JWT_SIGNING_KEY: "dev-only-signing-key-not-for-production"
      # 32 bytes, hex-encoded (internal/platform/envelope.KeySize) - the
      # envelope-encryption master key every SecretMount's own AppRole
      # secret_id is sealed under before it ever reaches Postgres. Same
      # "dev compose default, real deployment sources it from a real
      # secret store" posture as JWT_SIGNING_KEY above - genuinely not
      # the Vault instance's own root token, a separate key for a
      # separate purpose (this seals the credential Variables/Secrets
      # use to *authenticate to* Vault, it isn't a Vault credential
      # itself).
      SECRETS_MASTER_KEY: "3d418e2e891b5035a949b726cdb03ef6548dab2281d321e54df83de3f0158dfd"
    volumes:
      - mtls-certs:/certs:ro
    ports:
      - "8443:8443"
      # Host-side 9100, not 9000 - this host already has an unrelated
      # project (kubespray-webui) bound to 9000. Only the host-published
      # port changes; the Worker talks to the Control Plane over the
      # compose network's internal DNS (control-plane:9000), unaffected
      # by this remap.
      - "9100:9000"

  # Per-Job isolation, partial (docs/architecture/17-workers.md §4 gap) -
  # the raw host docker.sock is mounted into THIS container only, never
  # into the Worker. The Worker (and therefore any Job's docker-compose
  # invocation) reaches Docker exclusively through this proxy's scoped
  # API surface: real writes are possible (CONTAINERS/IMAGES/NETWORKS/
  # VOLUMES/POST=1, so `docker-compose up` genuinely works), but EXEC,
  # BUILD, SWARM, SYSTEM, PLUGINS, SECRETS, NODES and SERVICES are all
  # denied - a Job's compose file can't exec into an unrelated
  # container, can't touch the Docker daemon's own admin surface, can't
  # join/inspect swarm state. Honest limit: tecnativa/docker-socket-proxy
  # scopes by *API endpoint category*, not by container/project
  # ownership - it does not stop one Job's compose invocation from
  # listing or manipulating a DIFFERENT Job's containers (both still
  # share the same Docker daemon's container namespace). Full per-Job
  # isolation would need a Docker daemon per Job (nested dind) - a much
  # heavier real option, deliberately not chosen here (operator's own
  # call, weighing the added complexity against the real but partial
  # protection this proxy already gives).
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      POST: 1
      INFO: 1
      EXEC: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      AUTH: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      control-plane:
        condition: service_started
      docker-socket-proxy:
        condition: service_started
      mtls-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    environment:
      CONTROL_PLANE_GRPC_ADDR: "control-plane:9000"
      WORKER_ID: "worker-1"
      TLS_CA_CERT: /certs/ca-cert.pem
      TLS_CLIENT_CERT: /certs/worker-cert.pem
      TLS_CLIENT_KEY: /certs/worker-key.pem
      TLS_SERVER_NAME: "control-plane"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "worker"
      # Points docker-compose (and any other Docker CLI call this
      # process makes) at the socket-proxy service instead of a raw
      # docker.sock - see the docker-socket-proxy service's own comment
      # for exactly what that does and doesn't protect against. No code
      # change needed for this: the Docker/Compose CLI already honors
      # DOCKER_HOST from the environment, and exec.Command inherits this
      # process's environment by default.
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
    volumes:
      - mtls-certs:/certs:ro

volumes:
  cockroach-0-data:
  cockroach-1-data:
  cockroach-2-data:
  mtls-certs:
