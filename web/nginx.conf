server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS (127.0.0.11) resolves "control-plane" to its
    # current container IP. Using a variable in proxy_pass forces nginx to
    # re-resolve per this resolver's TTL instead of caching the IP for the
    # process lifetime, so it survives the control-plane container being
    # recreated/restarted (same pattern as compose-platform's own
    # nginx.conf, same operator, this session).
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $control_plane_upstream control-plane:8443;
        # No URI after the variable: nginx forwards the original incoming
        # request URI unchanged (documented nginx behavior only when
        # proxy_pass has no URI component) - the Go mux's routes are
        # already mounted under /api/v1/..., so this is exactly right.
        proxy_pass http://$control_plane_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri /index.html;
    }
}
